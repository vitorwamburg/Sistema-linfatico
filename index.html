<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Interativo Moderno - Sistema Linfático</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        /* ========================
           🎨 DESIGN & TIPOGRAFIA
           ======================== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: #0B0B0B;
            color: #F5F5F5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        #app-container {
            width: 100%;
            max-width: 600px;
            padding: 20px;
        }

        .card {
            background-color: #161616;
            border-radius: 16px;
            padding: 32px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            transition: opacity 0.3s ease;
        }

        h1, h2 {
            margin-bottom: 24px;
            text-align: center;
            font-weight: 800;
        }

        .question-counter {
            font-size: 0.9rem;
            color: #888;
            text-align: center;
            margin-bottom: 16px;
        }

        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-btn {
            background-color: #222;
            color: #F5F5F5;
            border: 2px solid #333;
            border-radius: 8px;
            padding: 16px;
            font-size: 1rem;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .option-btn:hover:not(:disabled) {
            background-color: #2A2A2A;
            border-color: #555;
            transform: translateY(-2px);
        }

        .option-btn.correct {
            background-color: #1b5e20 !important;
            border-color: #4caf50 !important;
            box-shadow: 0 0 15px rgba(76, 175, 80, 0.4);
            color: #fff;
        }

        .option-btn.wrong {
            background-color: #b71c1c !important;
            border-color: #f44336 !important;
            box-shadow: 0 0 15px rgba(244, 67, 54, 0.4);
            color: #fff;
        }

        .option-btn:disabled {
            cursor: not-allowed;
            opacity: 0.7;
        }

        /* ========================
           🧩 MODAL / POPUP
           ======================== */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: rgba(0, 0, 0, 0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: 1000;
            backdrop-filter: blur(4px);
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background-color: #161616;
            padding: 32px;
            border-radius: 16px;
            text-align: center;
            max-width: 400px;
            width: 90%;
            transform: translateY(20px);
            transition: transform 0.3s ease;
        }

        .modal-overlay.active .modal-content {
            transform: translateY(0);
        }

        .modal-title {
            font-size: 1.5rem;
            margin-bottom: 16px;
            font-weight: 800;
        }

        .text-success { color: #4caf50; }
        .text-danger { color: #f44336; }

        .modal-feedback {
            margin-bottom: 24px;
            line-height: 1.5;
            color: #CCC;
        }

        .modal-explanation {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid #333;
            font-size: 0.9rem;
            color: #AAA;
            text-align: left;
        }

        .btn-primary {
            background-color: #F5F5F5;
            color: #0B0B0B;
            border: none;
            padding: 14px 24px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
            margin-top: 20px;
        }

        .btn-primary:hover {
            background-color: #DDD;
            transform: translateY(-2px);
        }

        .screen { display: none; }
        .screen.active { display: block; animation: fadeIn 0.4s ease; }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

    <div id="app-container">
        <div id="quiz-screen" class="card screen active">
            <div class="question-counter" id="question-counter">Questão 1</div>
            <h2 id="question-text">Carregando pergunta...</h2>
            <div class="options-grid" id="options-container"></div>
        </div>

        <div id="result-screen" class="card screen">
            <h2>🎉 Quiz Finalizado!</h2>
            <p style="text-align: center; font-size: 1.2rem; margin-bottom: 10px;">Sua pontuação:</p>
            <h1 id="score-text" style="font-size: 3rem; color: #4caf50;">0/0</h1>
            <p id="score-feedback" style="text-align: center; color: #888; margin-bottom: 32px;">Excelente trabalho!</p>
            <button class="btn-primary" onclick="restartQuiz()">Jogar Novamente</button>
        </div>
    </div>

    <div id="feedback-modal" class="modal-overlay">
        <div class="modal-content">
            <h3 id="modal-title" class="modal-title">Resultado</h3>
            <p id="modal-feedback" class="modal-feedback">A resposta correta era...</p>
            <div id="modal-explanation" class="modal-explanation">Explicação aqui...</div>
            <button class="btn-primary" id="next-btn" onclick="nextQuestion()">Próxima Questão</button>
        </div>
    </div>

    <script>
        /* ========================
           🧠 BANCO DE QUESTÕES
           ======================== */
        const perguntas = [
            // Parte 1 (1 a 15)
            {
                pergunta: "Os capilares linfáticos possuem “fundo cego” porque:",
                opcoes: [
                    "Estão conectados diretamente às artérias",
                    "Permitem fluxo bidirecional",
                    "Iniciam-se no interstício sem conexão inicial com vasos maiores",
                    "Não possuem endotélio",
                    "São estruturas fechadas sem função circulatória"
                ],
                correta: 2,
                explicacao: "Eles começam no tecido intersticial sem ligação prévia com outros vasos, o que permite captar líquido intersticial."
            },
            {
                pergunta: "A principal função das valvas nos vasos linfáticos é:",
                opcoes: [
                    "Aumentar a pressão",
                    "Filtrar antígenos",
                    "Impedir refluxo da linfa",
                    "Produzir linfócitos",
                    "Controlar a viscosidade"
                ],
                correta: 2,
                explicacao: "As valvas garantem fluxo unidirecional da linfa, evitando retorno."
            },
            {
                pergunta: "A resposta imune humoral é mediada principalmente por:",
                opcoes: [
                    "Linfócitos T",
                    "Macrófagos",
                    "Linfócitos B",
                    "Neutrófilos",
                    "Células NK"
                ],
                correta: 2,
                explicacao: "Linfócitos B produzem anticorpos, caracterizando a resposta humoral."
            },
            {
                pergunta: "Qual estrutura está diretamente relacionada à maturação dos linfócitos T?",
                opcoes: [
                    "Baço",
                    "Medula óssea",
                    "Timo",
                    "Linfonodo",
                    "Tonsilas"
                ],
                correta: 2,
                explicacao: "O timo é responsável pela maturação dos linfócitos T."
            },
            {
                pergunta: "A barreira hemato-tímica tem como função:",
                opcoes: [
                    "Produzir anticorpos",
                    "Impedir entrada de antígenos no timo",
                    "Filtrar linfa",
                    "Destruir hemácias",
                    "Produzir linfócitos B"
                ],
                correta: 1,
                explicacao: "Ela protege os linfócitos em maturação contra antígenos do sangue."
            },
            {
                pergunta: "A região do linfonodo responsável pela predominância de linfócitos T é:",
                opcoes: [
                    "Córtex",
                    "Medula",
                    "Paracórtex",
                    "Hilo",
                    "Cápsula"
                ],
                correta: 2,
                explicacao: "O paracórtex é área timo-dependente (linfócitos T)."
            },
            {
                pergunta: "As células apresentadoras de antígeno (APCs) atuam principalmente:",
                opcoes: [
                    "Produzindo anticorpos",
                    "Destruindo vírus diretamente",
                    "Apresentando antígenos via MHC",
                    "Transportando linfa",
                    "Produzindo hemácias"
                ],
                correta: 2,
                explicacao: "Elas processam antígenos e os exibem no MHC para ativar linfócitos."
            },
            {
                pergunta: "O tecido linfóide denso nodular caracteriza-se por:",
                opcoes: [
                    "Baixa concentração celular",
                    "Ausência de organização",
                    "Formação de nódulos organizados",
                    "Presença apenas de macrófagos",
                    "Ausência de linfócitos"
                ],
                correta: 2,
                explicacao: "É organizado em nódulos linfáticos."
            },
            {
                pergunta: "O baço exerce função de filtro principalmente para:",
                opcoes: [
                    "Linfa",
                    "Plasma",
                    "Sangue",
                    "Líquido intersticial",
                    "Hormônios"
                ],
                correta: 2,
                explicacao: "O baço filtra o sangue, removendo células velhas e patógenos."
            },
            {
                pergunta: "A polpa branca do baço está relacionada principalmente com:",
                opcoes: [
                    "Hemocaterese",
                    "Produção de bile",
                    "Resposta imune",
                    "Filtração renal",
                    "Produção de linfa"
                ],
                correta: 2,
                explicacao: "Rica em linfócitos, atua na resposta imune."
            },
            {
                pergunta: "Na polpa vermelha do baço ocorre:",
                opcoes: [
                    "Produção de anticorpos",
                    "Hemocaterese",
                    "Maturação de linfócitos T",
                    "Produção de linfa",
                    "Ativação de APCs"
                ],
                correta: 1,
                explicacao: "É responsável pela destruição de hemácias velhas."
            },
            {
                pergunta: "A zona marginal do baço é importante porque:",
                opcoes: [
                    "Produz hemácias",
                    "Impede circulação sanguínea",
                    "É local de início da resposta imune",
                    "Armazena gordura",
                    "Produz hormônios"
                ],
                correta: 2,
                explicacao: "É onde ocorre o primeiro contato com antígenos do sangue."
            },
            {
                pergunta: "Os linfonodos recebem linfa através de vasos:",
                opcoes: [
                    "Eferentes",
                    "Aferentes",
                    "Arteriais",
                    "Venosos",
                    "Capilares sanguíneos"
                ],
                correta: 1,
                explicacao: "Os vasos aferentes levam linfa até o linfonodo."
            },
            {
                pergunta: "O MALT é composto por:",
                opcoes: [
                    "Apenas tecido digestivo",
                    "Apenas tecido respiratório",
                    "GALT e BALT",
                    "Apenas linfonodos",
                    "Apenas medula óssea"
                ],
                correta: 2,
                explicacao: "MALT inclui tecidos associados às mucosas (GALT + BALT)."
            },
            {
                pergunta: "A regressão do timo na vida adulta está relacionada principalmente a:",
                opcoes: [
                    "Aumento de linfócitos",
                    "Substituição por tecido adiposo",
                    "Crescimento contínuo",
                    "Produção de hemácias",
                    "Aumento da imunidade"
                ],
                correta: 1,
                explicacao: "O timo sofre involução e é parcialmente substituído por gordura."
            },
            // Parte 2 (16 a 30)
            {
                pergunta: "Qual das alternativas descreve corretamente as células foliculares dendríticas?",
                opcoes: [
                    "São APCs clássicas",
                    "Produzem anticorpos",
                    "Não apresentam antígenos via MHC, mas os retêm na superfície",
                    "Destruem células infectadas",
                    "Produzem linfa"
                ],
                correta: 2,
                explicacao: "Elas não são APCs típicas, apenas retêm complexos antígeno-anticorpo para linfócitos B reconhecerem."
            },
            {
                pergunta: "O hilo do linfonodo é responsável por:",
                opcoes: [
                    "Entrada de vasos aferentes",
                    "Saída de vasos eferentes e entrada de vasos sanguíneos",
                    "Produção de linfócitos",
                    "Filtração da linfa",
                    "Formação de nódulos"
                ],
                correta: 1,
                explicacao: "O hilo é a região côncava onde entram vasos sanguíneos e saem vasos linfáticos eferentes."
            },
            {
                pergunta: "A presença de vênulas de endotélio alto está associada a:",
                opcoes: [
                    "Transporte de oxigênio",
                    "Entrada de linfócitos no linfonodo",
                    "Produção de anticorpos",
                    "Filtração da linfa",
                    "Destruição de hemácias"
                ],
                correta: 1,
                explicacao: "Essas vênulas permitem que linfócitos saiam do sangue e entrem no linfonodo."
            },
            {
                pergunta: "A região cortical do linfonodo apresenta predominantemente:",
                opcoes: [
                    "Linfócitos T",
                    "Linfócitos B em nódulos",
                    "Hemácias",
                    "Neurônios",
                    "Plaquetas"
                ],
                correta: 1,
                explicacao: "O córtex contém nódulos linfáticos ricos em linfócitos B."
            },
            {
                pergunta: "Os seios subcapsulares do linfonodo têm função principal de:",
                opcoes: [
                    "Produzir linfócitos",
                    "Armazenar sangue",
                    "Permitir fluxo e filtragem da linfa",
                    "Produzir anticorpos",
                    "Destruir neurônios"
                ],
                correta: 2,
                explicacao: "São espaços onde a linfa circula e entra em contato com células de defesa."
            },
            {
                pergunta: "A bainha linfocitária periarterial (PALS) do baço é rica em:",
                opcoes: [
                    "Linfócitos B",
                    "Linfócitos T",
                    "Neutrófilos",
                    "Eritrócitos",
                    "Plaquetas"
                ],
                correta: 1,
                explicacao: "A PALS envolve arteríolas e é predominantemente composta por linfócitos T."
            },
            {
                pergunta: "Os centros germinativos dos nódulos linfáticos indicam:",
                opcoes: [
                    "Degeneração celular",
                    "Produção de hemácias",
                    "Ativação e proliferação de linfócitos B",
                    "Morte celular",
                    "Falha imunológica"
                ],
                correta: 2,
                explicacao: "São áreas de intensa proliferação de linfócitos B ativados."
            },
            {
                pergunta: "A hemocaterese ocorre principalmente:",
                opcoes: [
                    "No timo",
                    "Nos linfonodos",
                    "Na polpa vermelha do baço",
                    "Na medula óssea",
                    "No fígado exclusivamente"
                ],
                correta: 2,
                explicacao: "A polpa vermelha remove hemácias envelhecidas."
            },
            {
                pergunta: "O tecido linfóide não encapsulado está associado principalmente a:",
                opcoes: [
                    "Ossos",
                    "Mucosas",
                    "Músculos",
                    "Artérias",
                    "Sistema nervoso"
                ],
                correta: 1,
                explicacao: "Está presente em mucosas (digestória, respiratória, urogenital)."
            },
            {
                pergunta: "As placas de Peyer são exemplos de:",
                opcoes: [
                    "Órgãos encapsulados",
                    "Tecido linfóide do baço",
                    "Tecido linfóide intestinal",
                    "Linfonodos cervicais",
                    "Estruturas do timo"
                ],
                correta: 2,
                explicacao: "Fazem parte do GALT (intestino)."
            },
            {
                pergunta: "O timo é classificado como:",
                opcoes: [
                    "Órgão linfóide secundário",
                    "Órgão linfóide primário",
                    "Órgão digestivo",
                    "Glândula exócrina",
                    "Órgão muscular"
                ],
                correta: 1,
                explicacao: "Nele ocorre maturação de linfócitos T (função primária)."
            },
            {
                pergunta: "A região medular do timo apresenta:",
                opcoes: [
                    "Alta concentração de linfócitos imaturos",
                    "Corpúsculos de Hassall",
                    "Nódulos linfáticos",
                    "Hemácias",
                    "Alta atividade mitótica"
                ],
                correta: 1,
                explicacao: "Característica marcante da medula tímica."
            },
            {
                pergunta: "Os corpúsculos de Hassall são formados por:",
                opcoes: [
                    "Linfócitos B",
                    "Hemácias",
                    "Células epiteliais reticulares",
                    "Neutrófilos",
                    "Plaquetas"
                ],
                correta: 2,
                explicacao: "São estruturas concêntricas de células epiteliais."
            },
            {
                pergunta: "A principal função dos linfonodos satélites é:",
                opcoes: [
                    "Produzir linfa",
                    "Drenar regiões específicas do corpo",
                    "Produzir hemácias",
                    "Armazenar gordura",
                    "Produzir hormônios"
                ],
                correta: 1,
                explicacao: "Cada grupo drena áreas específicas do corpo."
            },
            {
                pergunta: "A redução do fluxo da linfa dentro do linfonodo favorece:",
                opcoes: [
                    "Aumento da pressão arterial",
                    "Filtração eficiente e reconhecimento de antígenos",
                    "Produção de hormônios",
                    "Formação de hemácias",
                    "Diminuição da imunidade"
                ],
                correta: 1,
                explicacao: "O fluxo lento permite maior contato com células imunes."
            }
        ];

        /* ========================
           💻 LÓGICA E ESTADO
           ======================== */
        let currentQuestionIndex = 0;
        let score = 0;

        const quizScreen = document.getElementById('quiz-screen');
        const resultScreen = document.getElementById('result-screen');
        const questionText = document.getElementById('question-text');
        const optionsContainer = document.getElementById('options-container');
        const questionCounter = document.getElementById('question-counter');
        
        const feedbackModal = document.getElementById('feedback-modal');
        const modalTitle = document.getElementById('modal-title');
        const modalFeedback = document.getElementById('modal-feedback');
        const modalExplanation = document.getElementById('modal-explanation');

        const letras = ["A)", "B)", "C)", "D)", "E)"];

        function initQuiz() {
            currentQuestionIndex = 0;
            score = 0;
            quizScreen.classList.add('active');
            resultScreen.classList.remove('active');
            loadQuestion();
        }

        function loadQuestion() {
            const currentQuestion = perguntas[currentQuestionIndex];
            
            questionText.textContent = currentQuestion.pergunta;
            questionCounter.textContent = `Questão ${currentQuestionIndex + 1} de ${perguntas.length}`;
            optionsContainer.innerHTML = '';

            currentQuestion.opcoes.forEach((optionText, index) => {
                const button = document.createElement('button');
                button.className = 'option-btn';
                button.textContent = `${letras[index]} ${optionText}`;
                button.onclick = () => handleAnswer(button, index);
                optionsContainer.appendChild(button);
            });
        }

        function handleAnswer(selectedButton, selectedIndex) {
            const currentQuestion = perguntas[currentQuestionIndex];
            const correctIndex = currentQuestion.correta;
            const allButtons = optionsContainer.querySelectorAll('.option-btn');

            allButtons.forEach(btn => btn.disabled = true);

            const isCorrect = (selectedIndex === correctIndex);

            if (isCorrect) {
                selectedButton.classList.add('correct');
                score++;
            } else {
                selectedButton.classList.add('wrong');
                allButtons[correctIndex].classList.add('correct');
            }

            setTimeout(() => {
                const respostaCorretaFormatada = `${letras[correctIndex]} ${currentQuestion.opcoes[correctIndex]}`;
                showModal(isCorrect, respostaCorretaFormatada, currentQuestion.explicacao);
            }, 1000);
        }

        function showModal(isCorrect, correctAnswerText, explicacao) {
            if (isCorrect) {
                modalTitle.textContent = "Acertou! ✅";
                modalTitle.className = "modal-title text-success";
                modalFeedback.innerHTML = `Mandou bem! A resposta é mesmo:<br><strong style="color: #F5F5F5">${correctAnswerText}</strong>`;
            } else {
                modalTitle.textContent = "Errou ❌";
                modalTitle.className = "modal-title text-danger";
                modalFeedback.innerHTML = `Poxa, não foi dessa vez.<br>A resposta correta era:<br><strong style="color: #F5F5F5">${correctAnswerText}</strong>`;
            }

            modalExplanation.innerHTML = `💡 <strong>Explicação:</strong> ${explicacao}`;

            const nextBtn = document.getElementById('next-btn');
            if (currentQuestionIndex === perguntas.length - 1) {
                nextBtn.textContent = "Ver Resultados";
            } else {
                nextBtn.textContent = "Próxima Questão";
            }

            feedbackModal.classList.add('active');
        }

        function nextQuestion() {
            feedbackModal.classList.remove('active');
            currentQuestionIndex++;

            if (currentQuestionIndex < perguntas.length) {
                setTimeout(loadQuestion, 300); 
            } else {
                setTimeout(showFinalResults, 300);
            }
        }

        function showFinalResults() {
            quizScreen.classList.remove('active');
            resultScreen.classList.add('active');

            const scoreText = document.getElementById('score-text');
            const scoreFeedback = document.getElementById('score-feedback');
            
            scoreText.textContent = `${score}/${perguntas.length}`;

            const percentage = score / perguntas.length;
            if (percentage >= 0.9) {
                scoreFeedback.textContent = "Incrível! Você dominou o assunto de verdade!";
            } else if (percentage >= 0.6) {
                scoreFeedback.textContent = "Muito bom! Seus conhecimentos estão bem afiados.";
            } else {
                scoreFeedback.textContent = "Continue praticando! Anatomia e fisiologia exigem dedicação.";
            }
        }

        function restartQuiz() {
            initQuiz();
        }

        initQuiz();
    </script>
</body>
</html>
